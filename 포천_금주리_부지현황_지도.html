<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포천 금주리 부지현황 지도</title>

<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;

    --cat-factory: #f0883e;
    --cat-gas: #3fb950;
    --cat-remain: #a371f7;
    --cat-across: #ff7b72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  header .title-block h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header .title-block p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .badge-row {
    display: flex;
    gap: 8px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .badge:hover { border-color: var(--accent); }
  .badge.active { border-color: currentColor; }
  .badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .badge[data-cat="공장/충전소 부지"] .dot { background: var(--cat-factory); }
  .badge[data-cat="주유소"] .dot { background: var(--cat-gas); }
  .badge[data-cat="잔여부지"] .dot { background: var(--cat-remain); }
  .badge[data-cat="건너편 토지"] .dot { background: var(--cat-across); }
  .badge[data-cat="공장/충전소 부지"] { color: var(--cat-factory); }
  .badge[data-cat="주유소"] { color: var(--cat-gas); }
  .badge[data-cat="잔여부지"] { color: var(--cat-remain); }
  .badge[data-cat="건너편 토지"] { color: var(--cat-across); }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header span { font-size: 12px; color: var(--text-muted); }
  .sidebar-header strong { font-size: 13px; }

  .search-box {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }

  .parcel-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .parcel-list::-webkit-scrollbar { width: 4px; }
  .parcel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cat-group { }
  .cat-label {
    padding: 8px 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    position: sticky;
    top: 0;
  }
  .cat-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .parcel-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .parcel-item:hover, .parcel-item.active {
    background: var(--surface2);
  }
  .parcel-item.active { border-left: 2px solid var(--accent); padding-left: 14px; }

  .parcel-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    min-width: 20px;
    text-align: right;
  }
  .parcel-info { flex: 1; min-width: 0; }
  .parcel-jibun {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
  }
  .parcel-sub {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .parcel-area {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-align: right;
    flex-shrink: 0;
  }
  .parcel-area span { display: block; font-size: 9px; color: var(--text-muted); }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: var(--bg);
  }

  /* ── POPUP ── */
  .kakao-popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    min-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .popup-cat {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .popup-jibun {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
    margin-bottom: 10px;
  }
  .popup-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .popup-row .k { color: #8b949e; }
  .popup-row .v { color: #e6edf3; font-weight: 500; }
  .popup-divider {
    height: 1px;
    background: #30363d;
    margin: 8px 0;
  }
  .popup-area-big {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: #58a6ff;
  }
  .popup-area-big span { font-size: 12px; color: #8b949e; }

  /* stats bar */
  .stats-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 24px;
    flex-shrink: 0;
  }
  .stat { font-size: 11px; color: var(--text-muted); }
  .stat strong { color: var(--text); font-family: 'IBM Plex Mono', monospace; }

  /* api key banner */
  #api-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 40px;
    text-align: center;
    max-width: 480px;
    width: 90%;
    z-index: 100;

  #api-banner p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
  #api-banner input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  #api-banner input:focus { border-color: var(--accent); }
  #api-banner button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
    width: 100%;
  }
  #api-banner button:hover { opacity: 0.85; }
  #api-banner .hint {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }
  #api-banner .hint a { color: var(--accent); text-decoration: none; }

  #map-container { flex: 1; position: relative; }
</style>
</head>

  {cat:'잔여부지',no:14,jimok:'주유소',jibun:'870-13',area_m2:1178,area_py:356.4,owner:null,user:null,note:null},
  {cat:'잔여부지',no:15,jimok:'잡종지',jibun:'889-1',area_m2:39,area_py:11.8,owner:null,user:null,note:'주유소 뒤편'},
  {cat:'잔여부지',no:16,jimok:'잡종지',jibun:'889-3',area_m2:177,area_py:53.5,owner:null,user:null,note:'주유소 뒤편'},
  {cat:'잔여부지',no:17,jimok:'잡종지',jibun:'889-4',area_m2:496,area_py:150.1,owner:null,user:null,note:'주유소 뒤편'},
  {cat:'잔여부지',no:18,jimok:'잡종지',jibun:'889-5',area_m2:258,area_py:78.0,owner:null,user:null,note:'주유소 뒤편'},
  {cat:'잔여부지',no:19,jimok:'잡종지',jibun:'889-6',area_m2:706,area_py:213.6,owner:null,user:null,note:'주유소 뒤편'},
  {cat:'건너편 토지',no:1,jimok:'잡종지',jibun:'874-1',area_m2:330,area_py:99.8,owner:'대성산업',user:null,note:null},
  {cat:'건너편 토지',no:2,jimok:'하천',jibun:'874-2',area_m2:1187,area_py:359.1,owner:null,user:null,note:null},
  {cat:'건너편 토지',no:3,jimok:'잡종지',jibun:'874-4',area_m2:651,area_py:196.9,owner:null,user:null,note:null},
  {cat:'건너편 토지',no:4,jimok:'하천',jibun:'875-1',area_m2:615,area_py:186.1,owner:null,user:null,note:null},
  {cat:'건너편 토지',no:5,jimok:'하천',jibun:'875-2',area_m2:615,area_py:186.1,owner:null,user:null,note:null},
];

const CAT_COLORS = {
  '공장/충전소 부지': '#f0883e',
  '주유소': '#3fb950',
  '잔여부지': '#a371f7',
  '건너편 토지': '#ff7b72',
};

const CAT_CNT_IDS = {
  '공장/충전소 부지': 'cnt-factory',
  '주유소': 'cnt-gas',
  '잔여부지': 'cnt-remain',
  '건너편 토지': 'cnt-across',
};

// count per category
const catCounts = {};
let totalArea = 0;
PARCELS.forEach(p => {
  catCounts[p.cat] = (catCounts[p.cat] || 0) + 1;
  totalArea += p.area_m2;
});
Object.entries(catCounts).forEach(([cat, cnt]) => {
  const el = document.getElementById(CAT_CNT_IDS[cat]);
  if (el) el.textContent = cnt + '필지';
});
document.getElementById('stat-area').textContent = totalArea.toLocaleString();
document.getElementById('stat-py').textContent = Math.round(totalArea / 3.3058).toLocaleString();

// ── STATE ──
let map = null;
let geocoder = null;
let markers = [];
let overlays = [];
let activeItem = null;
let visibleCats = new Set(Object.keys(CAT_COLORS));
let filterText = '';

// ── SIDEBAR LIST ──
function buildList() {
  const container = document.getElementById('parcel-list');
  container.innerHTML = '';
  const q = filterText.toLowerCase();

  const groups = {};
  PARCELS.forEach((p, idx) => {
    if (!visibleCats.has(p.cat)) return;
    if (q && !p.jibun.includes(q) && !(p.user||'').includes(q) && !(p.jimok||'').includes(q)) return;
    if (!groups[p.cat]) groups[p.cat] = [];
    groups[p.cat].push({p, idx});
  });

  let shown = 0;
  Object.entries(groups).forEach(([cat, items]) => {
    const grp = document.createElement('div');
    grp.className = 'cat-group';

    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.innerHTML = `<div class="dot" style="background:${CAT_COLORS[cat]}"></div>${cat} (${items.length})`;
    grp.appendChild(lbl);

    items.forEach(({p, idx}) => {
      shown++;
      const item = document.createElement('div');
      item.className = 'parcel-item';
      item.dataset.idx = idx;
      item.innerHTML = `
        <div class="parcel-num">${p.no}</div>
        <div class="parcel-info">
          <div class="parcel-jibun" style="color:${CAT_COLORS[p.cat]}">금주리 ${p.jibun}</div>
          <div class="parcel-sub">${p.jimok}${p.user ? ' · ' + p.user : ''}${p.note ? ' · ' + p.note : ''}</div>
        </div>
        <div class="parcel-area">${p.area_m2.toLocaleString()}<span>㎡</span></div>
      `;
      item.onclick = () => selectParcel(idx, item);
      grp.appendChild(item);
    });
    container.appendChild(grp);
  });

  document.getElementById('list-count').textContent = shown + '개';
}

function filterList() {
  filterText = document.getElementById('search-input').value;
  buildList();
}

function toggleCategory(badge) {
  const cat = badge.dataset.cat;
  if (visibleCats.has(cat)) {
    visibleCats.delete(cat);
    badge.classList.remove('active');
    badge.style.opacity = '0.4';
  } else {
    visibleCats.add(cat);
    badge.classList.add('active');
    badge.style.opacity = '1';
  }
  buildList();
  updateMarkerVisibility();
}

function updateMarkerVisibility() {
  markers.forEach((m, i) => {
    const p = PARCELS[i];
    if (m) m.setVisible(visibleCats.has(p.cat));
  });
}

// ── SELECT ──
function selectParcel(idx, listItem) {
  // deselect old
  if (activeItem) activeItem.classList.remove('active');
  // close overlays
  overlays.forEach(o => { if (o) o.setMap(null); });

  if (listItem) {
    listItem.classList.add('active');
    activeItem = listItem;
  }

  const p = PARCELS[idx];
  if (!map || !markers[idx]) return;

  const pos = markers[idx].getPosition();
  map.setCenter(pos);
  map.setLevel(3);

  showOverlay(idx, pos, p);
}

function showOverlay(idx, pos, p) {
  const color = CAT_COLORS[p.cat];
  const content = `
    <div class="kakao-popup" style="color:#e6edf3">
      <div class="popup-cat" style="color:${color}">${p.cat}</div>
      <div class="popup-jibun">금주리 ${p.jibun}</div>
      <div class="popup-row"><span class="k">지목</span><span class="v">${p.jimok}</span></div>
      ${p.user ? `<div class="popup-row"><span class="k">사용자</span><span class="v">${p.user}</span></div>` : ''}
      ${p.owner ? `<div class="popup-row"><span class="k">소유자</span><span class="v">${p.owner}</span></div>` : ''}
      ${p.note ? `<div class="popup-row"><span class="k">비고</span><span class="v">${p.note}</span></div>` : ''}
      <div class="popup-divider"></div>
      <div class="popup-area-big">${p.area_m2.toLocaleString()}<span> ㎡</span></div>
      <div style="font-size:11px;color:#8b949e;margin-top:2px">${p.area_py.toLocaleString()} 평</div>
    </div>`;

  const ov = new kakao.maps.CustomOverlay({
    position: pos,
    content: content,
    yAnchor: 1.3,
    zIndex: 10,
  });
  ov.setMap(map);
  overlays[idx] = ov;
}

// ── MAP INIT ──
function initMap() {
  const container = document.getElementById('map');
  const options = {
    center: new kakao.maps.LatLng(38.0055, 127.2310),
    level: 5,
  };
  map = new kakao.maps.Map(container, options);
  geocoder = new kakao.maps.services.Geocoder();

  // geocode all parcels sequentially (rate limit friendly)
  geocodeAll(0);
}

function geocodeAll(idx) {
  if (idx >= PARCELS.length) {
    buildList();
    return;
  }
  const p = PARCELS[idx];
  const addr = `경기도 포천시 영중면 금주리 ${p.jibun}`;
  geocoder.addressSearch(addr, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      const lat = parseFloat(result[0].y);
      const lng = parseFloat(result[0].x);
      createMarker(idx, lat, lng, p);
    }
    setTimeout(() => geocodeAll(idx + 1), 80);
  });
}

function createMarker(idx, lat, lng, p) {
  const pos = new kakao.maps.LatLng(lat, lng);
  const color = CAT_COLORS[p.cat];

  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='28' height='36'><path d='M14 0C6.3 0 0 6.3 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.3 21.7 0 14 0z' fill='${color}' opacity='0.9'/><circle cx='14' cy='14' r='6' fill='white' opacity='0.9'/></svg>`;
  const imgSrc = 'data:image/svg+xml;base64,' + btoa(svg);
  const imgSize = new kakao.maps.Size(28, 36);
  const imgOption = { offset: new kakao.maps.Point(14, 36) };
  const markerImg = new kakao.maps.MarkerImage(imgSrc, imgSize, imgOption);

  const marker = new kakao.maps.Marker({ position: pos, image: markerImg, map: map });
  markers[idx] = marker;

  kakao.maps.event.addListener(marker, 'click', () => {
    const listItems = document.querySelectorAll('.parcel-item');
    let found = null;
    listItems.forEach(li => { if (parseInt(li.dataset.idx) === idx) found = li; });
    selectParcel(idx, found);
    if (found) found.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

// ── API KEY ──
function applyApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { alert('API 키를 입력해주세요.'); return; }

  // reload script with key
  const existing = document.querySelector('script[src*="dapi.kakao.com"]');
  if (existing) existing.remove();

  const script = document.createElement('script');
  script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
  script.onload = () => {
    kakao.maps.load(() => {
      document.getElementById('api-banner').style.display = 'none';
      initMap();
      buildList();
    });
  };
  script.onerror = () => alert('API 키가 올바르지 않거나 도메인이 등록되지 않았습니다.');
  document.head.appendChild(script);
}

// initial list render
buildList();
</script>

</html>

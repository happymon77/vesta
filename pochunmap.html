<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포천 금주리 부지현황 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
  header h1{font-size:14px;font-weight:700;}
  header p{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .badge-row{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
  .badge{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;user-select:none;transition:opacity 0.15s;}
  .badge .dot{width:8px;height:8px;border-radius:50%;}
  .badge.off{opacity:0.3;}
  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
  .sb-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .sb-head strong{font-size:12px;}.sb-head span{font-size:11px;color:var(--text-muted);}
  .search{padding:8px 10px;border-bottom:1px solid var(--border);}
  .search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 9px;font-size:11px;font-family:inherit;outline:none;}
  .search input:focus{border-color:var(--accent);}
  .search input::placeholder{color:var(--text-muted);}
  .list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .list::-webkit-scrollbar{width:3px;}.list::-webkit-scrollbar-thumb{background:var(--border);}
  .grp-label{padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:0.6px;color:var(--text-muted);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;position:sticky;top:0;z-index:1;}
  .grp-label .dot{width:6px;height:6px;border-radius:50%;}
  .item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:background 0.1s;}
  .item:hover{background:var(--surface2);}
  .item.active{background:var(--surface2);border-left-color:var(--accent);}
  .item .num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-muted);min-width:16px;text-align:right;}
  .item .info{flex:1;min-width:0;}
  .item .jibun{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;}
  .item .sub{font-size:10px;color:var(--text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .area{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);text-align:right;flex-shrink:0;}
  .item .area small{display:block;font-size:9px;color:var(--text-muted);}
  #map{flex:1;}
  .stats{background:var(--surface);border-top:1px solid var(--border);padding:7px 16px;display:flex;gap:20px;flex-shrink:0;}
  .stat{font-size:11px;color:var(--text-muted);}
  .stat strong{color:var(--text);font-family:'IBM Plex Mono',monospace;}
  .npopup{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 16px;min-width:210px;box-shadow:0 8px 24px rgba(0,0,0,0.6);font-family:'Noto Sans KR',sans-serif;color:#e6edf3;}
  .npopup .pcat{font-size:10px;font-weight:700;letter-spacing:0.5px;margin-bottom:5px;}
  .npopup .pjibun{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;margin-bottom:9px;}
  .npopup .prow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
  .npopup .prow .k{color:#8b949e;}
  .npopup .pdiv{height:1px;background:#30363d;margin:7px 0;}
  .npopup .pbig{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:#58a6ff;}
  .npopup .pbig small{font-size:11px;color:#8b949e;}
  #loading{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--text-muted);display:none;}
</style>
</head>

document.getElementById('sa').textContent=total.toLocaleString();

const visible=new Set(CATS);
const badgeRow=document.getElementById('badges');
CATS.forEach(cat=>{
  const cnt=DATA.filter(p=>p.cat===cat).length;
  const b=document.createElement('div');
  b.className='badge';b.dataset.cat=cat;b.style.color=C[cat];
  b.innerHTML=`<div class="dot" style="background:${C[cat]}"></div>${cat} ${cnt}필지`;
  b.onclick=()=>{
    if(visible.has(cat)){visible.delete(cat);b.classList.add('off');}
    else{visible.add(cat);b.classList.remove('off');}
    markers.forEach((m,i)=>{if(m&&DATA[i].cat===cat)m.setVisible(visible.has(cat));});
    render();
  };
  badgeRow.appendChild(b);

let map,activeIdx=-1,activeItem=null;
const markers=[],infoWindows=[];

function initMap(){
  map=new naver.maps.Map('map',{
    center:new naver.maps.LatLng(38.0053,127.2315),
    zoom:15,
    mapTypeId:naver.maps.MapTypeId.HYBRID
  });
  document.getElementById('loading').style.display='block';
  geocodeAll(0);
  render();
}

async function geocodeAll(idx){
  if(idx>=DATA.length){
    document.getElementById('loading').style.display='none';
    return;
  }
  const p=DATA[idx];
  const query=encodeURIComponent(`경기도 포천시 영중면 금주리 ${p.jibun}`);
  try{
    const res=await fetch(`https://naveropenapi.apigw.ntruss.com/map-geocode/v2/geocode?query=${query}`,{
      headers:{'X-NCP-APIGW-API-KEY-ID':CLIENT_ID}
    });
    const data=await res.json();
    if(data.addresses&&data.addresses.length>0){
      const r=data.addresses[0];
      createMarker(idx,parseFloat(r.y),parseFloat(r.x),p);
    }
  }catch(e){}
  setTimeout(()=>geocodeAll(idx+1),150);
}

function createMarker(idx,lat,lng,p){
  const color=C[p.cat];
  const marker=new naver.maps.Marker({
    position:new naver.maps.LatLng(lat,lng),map,
    icon:{
      content:`<div style="width:26px;height:34px;cursor:pointer"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="34">
        <path d="M13 0C5.8 0 0 5.8 0 13c0 9.7 13 21 13 21s13-11.3 13-21C26 5.8 20.2 0 13 0z" fill="${color}" opacity="0.92"/>
        <circle cx="13" cy="13" r="5.5" fill="white" opacity="0.9"/></svg></div>`,
      anchor:new naver.maps.Point(13,34)
    }
  });
  markers[idx]=marker;
  const iw=new naver.maps.InfoWindow({
    content:`<div class="npopup">
      <div class="pcat" style="color:${color}">${p.cat}</div>
      <div class="pjibun">금주리 ${p.jibun}</div>
      <div class="prow"><span class="k">지목</span><span>${p.jimok}</span></div>
      ${p.user?`<div class="prow"><span class="k">사용자</span><span>${p.user}</span></div>`:''}
      ${p.owner?`<div class="prow"><span class="k">소유자</span><span>${p.owner}</span></div>`:''}
      ${p.note?`<div class="prow"><span class="k">비고</span><span>${p.note}</span></div>`:''}
      <div class="pdiv"></div>
      <div class="pbig">${p.m2.toLocaleString()}<small> ㎡ · ${p.py.toLocaleString()} 평</small></div>
    </div>`,
    backgroundColor:'transparent',borderWidth:0,
    anchorSize:new naver.maps.Size(0,0),
    pixelOffset:new naver.maps.Point(0,-38)
  });
  infoWindows[idx]=iw;
  naver.maps.Event.addListener(marker,'click',()=>{
    infoWindows.forEach(w=>w&&w.close());
    iw.open(map,marker);
    activeIdx=idx;
    const el=document.querySelector(`.item[data-i="${idx}"]`);
    if(el){if(activeItem)activeItem.classList.remove('active');el.classList.add('active');activeItem=el;el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  });
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const list=document.getElementById('list');
  list.innerHTML='';let shown=0;
  CATS.forEach(cat=>{
    const items=DATA.map((p,i)=>({p,i})).filter(({p})=>
      p.cat===cat&&visible.has(cat)&&
      (!q||p.jibun.includes(q)||(p.user||'').includes(q)||(p.jimok||'').includes(q))
    );
    if(!items.length)return;
    shown+=items.length;
    const lbl=document.createElement('div');
    lbl.className='grp-label';
    lbl.innerHTML=`<div class="dot" style="background:${C[cat]}"></div>${cat} (${items.length})`;
    list.appendChild(lbl);
    items.forEach(({p,i})=>{
      const el=document.createElement('div');
      el.className='item'+(i===activeIdx?' active':'');
      el.dataset.i=i;
      el.innerHTML=`
        <div class="num">${p.no}</div>
        <div class="info">
          <div class="jibun" style="color:${C[p.cat]}">금주리 ${p.jibun}</div>
          <div class="sub">${p.jimok}${p.user?' · '+p.user:''}${p.note?' · '+p.note:''}</div>
        </div>
        <div class="area">${p.m2.toLocaleString()}<small>㎡</small></div>`;
      el.onclick=()=>{
        if(activeItem)activeItem.classList.remove('active');
        el.classList.add('active');activeItem=el;activeIdx=i;
        if(markers[i]){
          map.setCenter(markers[i].getPosition());
          map.setZoom(17);
          infoWindows.forEach(w=>w&&w.close());
          if(infoWindows[i])infoWindows[i].open(map,markers[i]);
        }
      };
      list.appendChild(el);
    });
  });
  document.getElementById('cnt').textContent=shown+'개';
}
</script>

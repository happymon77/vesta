<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대성쎌틱 회의 회장님 지시사항 통합표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans KR",sans-serif;font-size:17px;}
.header{background:linear-gradient(135deg,#161b22,#0d1117);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:19px;font-weight:700;}
.header p{font-size:12px;color:var(--text2);margin-top:2px;}
.badge{background:#6b9fd4;color:#fff;font-size:12px;font-weight:700;padding:3px 11px;border-radius:99px;font-family:"DM Mono",monospace;}
.tabs{display:flex;gap:2px;padding:11px 28px 0;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:8px 17px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all 0.2s;border-radius:6px 6px 0 0;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.active{color:#6b9fd4;border-bottom-color:#6b9fd4;background:var(--surface2);}
.content{padding:16px 28px;}
.page-section{display:none;}
.page-section.active{display:block;}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.sum-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.sum-card .bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.sum-card .codelbl{font-family:"DM Mono",monospace;font-size:20px;font-weight:900;margin-bottom:4px;}
.sum-card .lbl{font-size:20px;color:#fff;font-weight:700;margin-bottom:6px;line-height:1.3;}
.sum-card .num{font-size:20px;font-weight:900;font-family:"DM Mono",monospace;line-height:1;}
.sum-card .pct{font-size:11px;color:var(--text2);margin-top:3px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.chart-card h3{font-size:20px;font-weight:700;color:var(--text2);margin-bottom:14px;}
.chart-wrap{position:relative;height:185px;}
/* 빈도표 */
.freq-layout{display:flex;gap:14px;align-items:flex-start;height:calc(100vh - 110px);}
.freq-left{flex-shrink:0;overflow-y:auto;max-height:100%;}
.freq-right{flex:1;min-width:0;overflow-y:auto;max-height:100%;}
.freq-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ftable{border-collapse:collapse;white-space:nowrap;}
.ftable,.ftable td,.ftable th{font-size:13px !important;}
.ftable thead th{background:var(--surface2);padding:5px 10px;text-align:center;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);}
.ftable thead th.th-cat{text-align:left;min-width:130px;}
.ftable thead th.th-sub{text-align:left;min-width:185px;border-left:1px solid var(--border);}
.ftable thead th.th-code{min-width:54px;border-left:1px solid var(--border);}
.ftable thead th.th-mo{min-width:62px;}
/* 대분류: 이름행 */
.ftable tr.rcat-name td{background:#191e27;padding:5px 10px 1px 10px;font-weight:700;border-top:2px solid var(--border);}
/* 대분류: 소계행 */
.ftable tr.rcat-tot td{background:#191e27;padding:1px 10px 5px 10px;border-bottom:1px solid #2a3040;}
.cat-name{display:flex;align-items:center;gap:7px;}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.subtotal{font-size:11px !important;color:var(--text2);}
/* 중분류 행 */
.ftable tr.rsub td{padding:4px 10px;border-bottom:1px solid #252b35;}
.ftable tr.rsub:hover td{background:rgba(255,255,255,.025);}
.ftable tr.rsub td.sub-name{border-left:1px solid var(--border);color:var(--text2);padding-left:14px;}
.ftable tr.rsub td.sub-code{border-left:1px solid var(--border);text-align:center;font-family:"DM Mono",monospace;color:var(--text2);font-weight:700;}
.ftable tr.rtot td{background:rgba(255,255,255,.04);padding:5px 10px;font-weight:700;border-top:2px solid #444;}
.fn{display:inline-flex;align-items:center;justify-content:center;min-width:32px;padding:2px 6px;border-radius:6px;font-family:"DM Mono",monospace;font-weight:700;cursor:pointer;transition:all .15s;}
.fn:hover{filter:brightness(1.4);transform:scale(1.08);}
.fn.active-cell{outline:2px solid rgba(255,255,255,.6);outline-offset:1px;}
.fn.zero{color:#3a3f49;background:none!important;cursor:default;font-weight:400;}
.fn.zero:hover{filter:none;transform:none;}
td.nc{text-align:center;vertical-align:middle;}
/* 드릴다운 */
.drill-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:sticky;top:0;}
.drill-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:250px;color:var(--text2);font-size:14px;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.drill-empty .icon{font-size:30px;opacity:.4;}
.drill-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 17px;border-bottom:1px solid var(--border);}
.drill-hdr h3{font-size:14px;font-weight:700;line-height:1.4;}
.drill-hdr .dmeta{font-size:12px;color:var(--text2);margin-top:3px;}
.drill-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.drill-close:hover{color:var(--text);}
.drill-list{list-style:none;overflow-y:auto;max-height:calc(100vh - 200px);}
.ditem{padding:11px 17px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.ditem:last-child{border-bottom:none;}
.ditem:hover{background:rgba(255,255,255,.04);}
.dino{font-family:"DM Mono",monospace;font-size:11px;color:var(--text2);margin-bottom:4px;}
.ditext{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.dimeta{font-size:11px;color:var(--text2);margin-top:5px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.ctag{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;font-family:"DM Mono",monospace;}
/* 전체 목록 */
.filter-bar{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;align-items:center;}
.filter-bar input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text);font-size:14px;font-family:inherit;flex:1;min-width:200px;outline:none;}
.filter-bar input:focus{border-color:#6b9fd4;}
.cbt{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.msel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.rcnt{font-size:12px;color:var(--text2);margin-left:auto;white-space:nowrap;}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table.ltbl{width:100%;border-collapse:collapse;}
table.ltbl thead th{background:var(--surface2);padding:9px 13px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.ltbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
table.ltbl tbody tr:last-child{border-bottom:none;}
table.ltbl tbody tr:hover{background:var(--surface2);}
table.ltbl td{padding:10px 13px;vertical-align:top;font-size:13px;}
td.td-text{white-space:pre-wrap;word-break:break-word;line-height:1.75;}
.pgn{display:flex;align-items:center;gap:5px;padding:12px;justify-content:center;border-top:1px solid var(--border);}
.pgb{padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;}
.pgb:hover{border-color:#6b9fd4;color:#6b9fd4;}
.pgb.active{background:#6b9fd4;border-color:#6b9fd4;color:#000;font-weight:700;}
.pgb:disabled{opacity:.3;cursor:default;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;}
.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;margin-top:-2px;}
.modal h2{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.5;}
.mmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.mmeta span{font-size:12px;color:var(--text2);font-family:"DM Mono",monospace;}
.mbody{white-space:pre-wrap;line-height:1.8;font-size:14px;color:var(--text);background:var(--surface2);border-radius:8px;padding:15px;border:1px solid var(--border);}
/* === Senior high-contrast mode (85세 가독성 모드) === */
:root.senior{
  --bg:#ffffff !important;
  --surface:#ffffff !important;
  --surface2:#f3f5f7 !important;
  --border:#b8c1cc !important;
  --text:#111111 !important;
  --text2:#2b2b2b !important;
}
:root.senior body{background:var(--bg) !important;color:var(--text) !important;}
:root.senior .header{background:var(--surface) !important;border-bottom:2px solid var(--border) !important;}
:root.senior .header h1{font-size:28px !important;letter-spacing:-0.2px;}
:root.senior .header p{font-size:18px !important;}
:root.senior .badge{font-size:16px !important;padding:8px 12px !important;border:2px solid var(--border) !important;}
:root.senior .tabs{gap:10px !important;}
:root.senior .tab{font-size:18px !important;padding:12px 18px !important;border-bottom-width:4px !important;}
:root.senior .content{padding:20px 28px !important;}
:root.senior .sum-card{padding:18px 18px !important;border-width:2px !important;}
:root.senior .sum-card .codelbl{font-size:28px !important;}
:root.senior .sum-card .lbl{font-size:22px !important;color:var(--text) !important;}
:root.senior .sum-card .num{font-size:26px !important;}
:root.senior .chart-card h3{font-size:22px !important;color:var(--text) !important;}
:root.senior .chart-card{border-width:2px !important;}
:root.senior .freq-layout{gap:18px !important;}
:root.senior .freq-wrap,.tbl-wrap{border-width:2px !important;}
:root.senior .ftable thead th{font-size:16px !important;padding:10px 12px !important;border-bottom-width:3px !important;}
:root.senior .ftable td{font-size:18px !important;padding:12px 12px !important;}
:root.senior table.ltbl thead th{font-size:16px !important;padding:12px 14px !important;}
:root.senior table.ltbl td{font-size:18px !important;padding:12px 14px !important;line-height:1.8 !important;}
:root.senior .filter-bar input{font-size:18px !important;padding:12px 14px !important;border-width:2px !important;}
:root.senior .msel{font-size:18px !important;padding:10px 12px !important;border-width:2px !important;}
:root.senior .cbt{font-size:16px !important;padding:10px 14px !important;border-width:2px !important;}
:root.senior .rcnt{font-size:16px !important;}
:root.senior .drill-list .ditext{font-size:18px !important;line-height:1.9 !important;}
:root.senior .modal{border-width:2px !important;}
:root.senior .mbody{font-size:18px !important;line-height:1.9 !important;border-width:2px !important;}
:root.senior .pgb{font-size:16px !important;padding:10px 14px !important;border-width:2px !important;}
:root.senior .pgb.active{color:#111 !important;}
:root.senior table.ltbl tbody tr:hover{background:#eef2f6 !important;}
:root.senior .ditem:hover{background:#eef2f6 !important;}

/* Toggle button */
.senior-toggle{
  margin-left:12px;
  padding:10px 14px;
  border-radius:12px;
  border:2px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  font-size:16px;
  cursor:pointer;
  user-select:none;
}
.senior-toggle:hover{filter:brightness(0.98);}


/* === Senior patch v2 (가독성/레이아웃 수정) === */
:root.senior{
  /* 기존 다크테마 변수까지 강제로 백색 계열로 덮어쓰기 */
  --panel:#ffffff !important;
  --card:#ffffff !important;
  --card2:#ffffff !important;
  --ink:#111111 !important;
  --muted:#2b2b2b !important;
  --shadow: rgba(0,0,0,0.08) !important;
}

/* 월별 빈도표 하단/여백 검정 공간 제거 */
:root.senior .freq-wrap,
:root.senior .freq-layout,
:root.senior .freq-layout > *,
:root.senior .chart-card,
:root.senior .tbl-wrap,
:root.senior .content,
:root.senior .page,
:root.senior .tabpane,
:root.senior .tab-content{
  background:#ffffff !important;
}

/* 월별 빈도표 행 높이 15% 축소: padding/line-height 조정 */
:root.senior .ftable td{
  padding:10px 12px !important;      /* 12 -> 10 (약 -17%) */
  line-height:1.35 !important;
}
:root.senior .ftable thead th{
  padding:9px 12px !important;       /* 10 -> 9 */
}

/* 소계 텍스트(예: "소계 : 85건 (23.4%)") 대비/크기 개선 */
:root.senior .subtotal,
:root.senior .subtot,
:root.senior .sumline,
:root.senior .sum-card .num,
:root.senior .sum-card .lbl{
  color:#ffffff !important; /* 요청: 흰색 표시 */
}
:root.senior .sum-card .num{
  font-size:calc(26px * 1.3) !important; /* +30% */
}
:root.senior .sum-card{
  background:#111111 !important; /* 흰색 텍스트가 보이도록 카드 배경을 진하게 */
  border-color:#111111 !important;
}

/* 전체목록: 대분류/중분류 한 줄 표시 + 너비 확대 */
:root.senior .content{
  max-width: 1600px !important;
}
:root.senior .tbl-wrap{
  overflow-x:auto !important;
}
:root.senior table.ltbl{
  min-width: 1500px !important;
  table-layout: auto !important;
}
:root.senior table.ltbl td:nth-child(1),
:root.senior table.ltbl td:nth-child(2),
:root.senior table.ltbl th:nth-child(1),
:root.senior table.ltbl th:nth-child(2){
  white-space: nowrap !important;
}


/* === Senior patch v3 (추가 요청 반영) === */

/* 전체목록: 대분류/중분류 열 너비 50% 확대 */
:root.senior table.ltbl th:nth-child(1),
:root.senior table.ltbl td:nth-child(1){min-width:360px !important;}
:root.senior table.ltbl th:nth-child(2),
:root.senior table.ltbl td:nth-child(2){min-width:520px !important;}

/* 월별 빈도표: 검정색(대분류 구분행/소계행) 제거 */
:root.senior .ftable tr.rcat-name td,
:root.senior .ftable tr.rcat-tot td{
  background:#ffffff !important;
  color:#111111 !important;
  border-top:2px solid var(--border) !important;
  border-bottom:1px solid var(--border) !important;
}
:root.senior .ftable tr.rsub td{
  border-bottom:1px solid var(--border) !important;
}
:root.senior .ftable tr.rsub:hover td{
  background:#eef2f6 !important;
}

/* 월별 빈도표: '소계' 글자 40% 확대 */
:root.senior .ftable tr.rcat-tot td .subtotal{
  font-size: calc(18px * 1.4) !important;
  font-weight:800 !important;
  color:#111111 !important;
}

/* 개요: %가 안 보이는 문제 해결 + 2배 확대 + 85 옆(약 1cm) 배치 */
:root.senior .sum-card .num{
  font-size: calc(26px * 1.3) !important; /* 숫자도 살짝 키움(기존 30% 유지) */
  display:inline-block !important;
  vertical-align:baseline !important;
  margin:0 !important;
}
:root.senior .sum-card .pct{
  color:#ffffff !important;
  font-size: calc(18px * 2) !important; /* 두배 */
  font-weight:800 !important;
  display:inline-block !important;
  margin-left:38px !important; /* 약 1cm */
  vertical-align:baseline !important;
}

/* 개요: 검정 박스(카드) 높이 축소 */
:root.senior .sum-card{
  padding:12px 14px !important;
}

/* 차트 카드 높이 축소(개요 탭) */
:root.senior #tab-overview .chart-wrap{height:150px !important;}
:root.senior #tab-overview .chart-wrap[style]{height:220px !important;} /* 누적현황(기존 300) */

/* 월별 지시사항 추이/대분류별 구성/누적현황 카드 패딩 축소 */
:root.senior #tab-overview .chart-card{padding:12px 14px !important;}
:root.senior #tab-overview .chart-card h3{margin:0 0 10px 0 !important;}

/* 월별 빈도표 우측 패널 높이/여백 축소(검정 여백 방지 포함) */
:root.senior #tab-freq .drill-empty,
:root.senior #tab-freq .drill-panel{
  background:#ffffff !important;
}


/* === Senior patch v4 (2026-02-26 추가 수정) === */

/* 개요 카드: 숫자(85 등)는 대분류 색상 유지(기존 inline style) */
:root.senior .sum-card .num{ color: inherit !important; }

/* 개요 카드: %는 작게(1/2) + 굵기 해제 + 흰색 */
:root.senior .sum-card .pct{
  font-size: 18px !important;   /* 기존 2배(약 36px)에서 절반 수준 */
  font-weight:400 !important;   /* 굵기 해제 */
  color:#ffffff !important;
  margin-left:38px !important;
}

/* 개요 차트: 월별 지시사항 추이 높이 15% 증가 */
:root.senior #tab-overview .charts-row .chart-card:first-child .chart-wrap{
  height:175px !important;      /* 150px -> 175px (+~16.7%) */
}

/* 월별 빈도표: 대분류 행에 붙는 '빈 칸(검정/흰 띠)' 제거 */
:root.senior .ftable tr.rcat-name td{
  padding:6px 10px !important;
}
:root.senior .ftable tr.rcat-name td[colspan]{
  padding:0 !important;
  height:0 !important;
  line-height:0 !important;
  border:0 !important;
  background:transparent !important;
}
/* 소계 표시 줄도 상하 여백 축소(불필요한 흰 띠 감소) */
:root.senior .ftable tr.rcat-name td .subtotal{
  display:inline-block;
  margin-top:2px !important;
}


/* === Senior patch v5 (2026-02-26 추가 요청 반영) === */

/* 1) 개요: 카드(ABCDEF) 숫자 색상을 대분류 색상으로 강제(5~6색) + 카드 배경은 밝게 */
:root.senior .sum-card{
  background:#ffffff !important;
  color:#111111 !important;
  border-color:var(--border) !important;
}
:root.senior .sum-card .pct{
  color:#111111 !important;     /* 밝은 배경에서 보이게 */
  font-size:18px !important;    /* 절반 수준 유지 */
  font-weight:400 !important;   /* 굵기 해제 */
}
/* 각 카드별 색상 매핑 (기존 데이터의 색상값 사용) */
:root.senior .sum-card[onclick*="goFreq('A')"] .num,
:root.senior .sum-card[onclick*="goFreq('A')"] .codelbl{color:#6b9fd4 !important;}
:root.senior .sum-card[onclick*="goFreq('B')"] .num,
:root.senior .sum-card[onclick*="goFreq('B')"] .codelbl{color:#c0504d !important;}

체크밸브의 역할을 하도록 조치\n  S/W 변경이 아닌 프로그램을 단순화하기 위해 기계적으로 안전하게 만드는 방안 검토할 것"}, {"no": 167, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "A-2", "cat": "A", "text": "2. 당사 캐스케이드 3대 이상 연결시 유효성 검증 \n • 캐스케이드 4대 : 40LPM 유량 증가 \n  경동 (+6), VXP (+2, -3), K-Type (+4, -10)\n• 당연히 마이너스가 되어야 하고 마이너스 편차가\n  얼마나 작은가가 문제라 생각했지만 경동의 경우\n  플러스가 나오는 사항에 대해 한번 더 검토할 것"}, {"no": 168, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "A-2", "cat": "A", "text": "2. 당사 캐스케이드 3대 이상 연결시 유효성 검증 \n • 변경 : 설치대수와 관계없이 1대만 가동대기 \n         즉, 1대만 유량조절밸브 오픈 상태 \n         부하율 65% → 다음제품 유량조절밸브 오픈\n• 새로 나가는 K-Type 제품도 마찬가지로 유량조절밸브를 닫는 방법을 검토해 볼 것"}, {"no": 169, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "• Distributor 분석 및 평가 \n  이제 자료가 많이 축적되었으므로 단순 판매 실적이 아니라 Distributor 별로 워런티와 \n  AS 처리 방식에 대한 분석•평가 단계로 진입해야 함"}, {"no": 170, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "• Distributor의 책임 범위와 거래 원칙\n  회사가 기술 지도와 AS 훈련을 통해 Distributor가 제품을 이해하고 직접 AS를 수행할 수 \n  있도록 지원해야 하나, AS 교육을 받지 않고, AS 발생 시 무조건 워런티 반품으로 처리\n  하여 고가의 비용을 발생시키는 비협조적인 Distributor와는 거래 불가"}, {"no": 171, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "문제는 단순히 한두 대의 판매량이 아니라 AS 수행 능력 여부이며, \n  AS가 가능한 Distributor와만 거래하는 것이 향후 판매 전략의 기본 원칙 \n ① Distributor별 워런티 발생 및 AS 대응방식 전수 분석\n ② 무분별한 워런티 청구로 회사에 손해를 끼친 Distributor는 거래대상에서 제외\n ③ 현재 적극적으로 AS를 수행하는 제한된 Distributor 범위 내에서만 판매 진행 \n ④ RING 제품이 AS 발생률이 낮고, 소비자 반응이 긍정적이라는 점이 확인된 경우에만 판매 확대"}, {"no": 172, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "• Distributor 계약서 개정 방향 \n  Distributor 계약서에 다음 권리를 명확히 명시할 필요 있음 \n ① 무분별한 워런티 청구에 대해 회사가 워런티 처리를 거부할 수 있는 권리 \n ② 이와 같은 Distributor에 대해 제품 판매 자체를 거부할 수 있는 권리 \n ③ 계약조항의 근거 \n    지금까지 발생한 Distributor별 워런티 사례를 전수 조사 \n    무분별한 청구로 회사에 손실을 입힌 실제 케이스들을 구체적으로 정리 \n    이를 문언화하여 계약의 합리적 근거로 삼을 것 \n ④ 이와 같은 계약이 되어 있는데도 불구하고 무분별한 워런티가 발생할 경우 그 비용을\n    Distributor가 부담하도록 하는 조항을 변호사와 협의하여 신중하게 포함시키고, \n    Distributor가 해당 계약내용을 명확히 인지한 상태에서 계약하도록 할 것."}, {"no": 173, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "C-4", "cat": "C", "text": "• 온수기 HEX 누수 사례 \n  HEX 누수와 같은 중대한 워런티가 발생되는 제품 판매는 극도로 신중해야 함. \n    중대한 하자가 반복적으로 생기는 제품은 판매대상에서 제외해야 함\n경미한 하자라 하더라도 \n  • Distributor 산하 Plumber들이 현장 AS를 수행할 수 있는 체계 \n  • 품질 안정성 \n  • AS 조직과 프로세스 \n  가 갖춰지지 않으면 판매 불가한 제품의 대표적인 것이 온수기라는 점을 명확히 인식할 것"}, {"no": 174, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "C-4", "cat": "C", "text": "• 판매 가이드라인 정립\n  반드시 AS 체제가 갖춰진 지역에만 판매. 워런티를 남발하는 지역에서는 판매 불가.\n • AS 가능한 지역, AS 가능한 Distributor에만 판매 \n • HEX 누수와 같은 중대 AS가 발생하지 않는 제품만 판매\n • 중대 AS 발생 시 해당 제품 즉시 판매 중단 \n • 대안이 없을 경우 조직 철수 결정 \n • 기존 판매 제품에 대해서는 대성의 신용만 유지하고 신규 판매는 중단"}, {"no": 175, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "새로운 Distributor는 Rep이 소개했다고 무조건 거래하면 안 되며 계약서에 서명한 업체만 \n 거래를 한다. LA 라스베가스 전시회 이전에 계약서 초안 보고할 것."}, {"no": 176, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "우리가 기술을 지도하고 AS 훈련을 계속 시켜서 제품을 쓸 수 있게, AS를 할 수 있게 \n 도와주는 것은 반드시 해야 하지만, 아예 AS 교육도 안 받고, AS 생기면 무조건 워런티로 \n 반품시키고 우리에게 고가의 비용을 발생시키는 것에 대해 관심이 없는 비협조적인 \n Distributor와는 거래를 해서는 안 된다."}, {"no": 177, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "단순히 한두 대 파는 것이 문제가 아니고 AS가 가능한 Distributor와 거래를 해야 한다. \n 그런 Distributor를 찾아서 거래하는 것이 지금부터의 판매전략의 가장 기본이라는 것을 \n 이해하고 지금부터 Distributor들이 어떤 형태로 하고 있는 지 분석을 하면서 워런티를 \n 무분별하게 발생시킨, 우리에게 손해를 끼친 Distributor는 일단 거래에서 아웃시키는 \n 기본 원칙을 갖고 빨리 분석을 해볼 것"}, {"no": 178, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "Distributor 계약서에 무분별한 워런티에 대해서는 우리가 워런티 취급거부를 할 수 있는 \n 권리와 Distributor한테 판매를 거부할 수 있는 권리를 명기하도록 하고 \n 그 조건들을 변호사와 의논하며 그 근거는 현재까지 Distributor에 발생된 워런티 상황을 다 \n 조사해서 무분별하게 우리한테 청구한 회사들의 케이스를 구체적으로 예시하여 \n 말로 표현한 것이 Distributor 게약의 근거가 되고, 우리가 클레임을 거부할 수 있는, \n 지불을 거부할 수 있는 근거가 된다."}, {"no": 179, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "D-1", "cat": "D", "text": "반드시 AS 체제가 갖춰진 지역에만 판다. 워런티를 남발하는 지역에서는 우리가 팔 수 \n없다. 지금은 잘못된 제품을 판 죄로 이것저것 묻지도 못하고 다 덮으면서 참 말 못할 \n우리 회사 창업에 이렇게 창피스러운 일이 없을 정도로 큰 적자를 보고 있다. \n 다시 파는 물건에 대해서는 AS가 되는 지역, AS가 되는 Distributor에만 판다."}, {"no": 180, "title": "대성쎌틱 회의 주요 지시사항  < VESTA 영업, 마케팅, 리콜, R&D)", "date": "2025.12.30(화)", "month": "2025.12", "code": "A-1", "cat": "A", "text": "장사가 안되면 철수한다. HEX 누수 같은 큰 AS가 발생하지 않는 제품을 판다. \n큰 AS가 발생하면 그 제품 판매 자체를 바로 중지한다. 대안이 없으면 조직을 철수하고, \n그 동안 팔린 제품에 대해서 대성의 신용만 지키고 우리는 철수한다는 큰 가이드라인을 \nLA 지사와 고 대표가 행동으로 옮겨주도록 할 것"}, {"no": 181, "title": "대성쎌틱 회의 주요 지시사항 (국내영업, 제품개발 및 R&D)", "date": "2025.10.16(목)", "month": "2025.10", "code": "C-5", "cat": "C", "text": "< 영업부문 – 국내> \n1. 신규 수요처 지속 발굴과 패키지 영업 \n 1) 프랜차이즈 : 시간을 갖고 접촉할 것 \n 2) 시설관리전문회사 : 대형보일러+냉난방시설\n 3) 온수기를 사용하는 음식점 등에 서비스로봇+청소기+세제 등 영업방안 검토\n 4) 기계사업부와 공동영업 체계 구축 검토\n 5) 기타 골프장, 요양시설 등 온수기, 전열 교환기, 로봇 (청소, 서빙) 등 패키지 영업"}, {"no": 182, "title": "대성쎌틱 회의 주요 지시사항 (국내영업, 제품개발 및 R&D)", "date": "2025.10.16(목)", "month": "2025.10", "code": "C-4", "cat": "C", "text": "1) 원통형 마케팅 포인트 \n  ① 10년 열교환기 무상 보증 \n  ② Cold Sandwich 현상 없음\n  ③ 다수의 수도꼭지 사용시에도 온도차 적음"}, {"no": 183, "title": "대성쎌틱 회의 주요 지시사항 (국내영업, 제품개발 및 R&D)", "date": "2025.10.16(목)", "month": "2025.10", "code": "C-4", "cat": "C", "text": "2) 문제인지, 자사 제품 영향 여부 확인 \n  3) 명확한 원인 규명 전까지 지속 추적 조사"}, {"no": 197, "title": "대성쎌틱 회의 주요 지시사항 (영업∙마케팅, 리콜, 생산∙R&D, 제품∙고객관리)", "date": "2025.10.13(월)", "month": "2025.10", "code": "A-6", "cat": "A", "text": "1. 부품•제품 관리체계 고도화\n  1) PCB, HE 등 주요 부품 교체 시 S/N 철저 관리\n  2) S/N별 불량 발생 시 불량률 관리수준에 따른 Warning 시스템 구축\n  3) ERP•PLM•CRM 간 연동체계 구축 필요"}, {"no": 198, "title": "대성쎌틱 회의 주요 지시사항 (영업∙마케팅, 리콜, 생산∙R&D, 제품∙고객관리)", "date": "2025.10.13(월)", "month": "2025.10", "code": "E-1", "cat": "E", "text": "1. EKFF 조직문화 강조 \n  1) 전 임직원 EKFF 문화 내재화 \n     E (Experience) 경험 + K (Knowledge) 지식 + From + F (Failure) 실패 학습\n  2) 반복되는 실수•하자 사례를 체계적으로 기록•공유\n  3) ISO LIST와 함께 EKFF 기록과 Video 매뉴얼 병행 등록\n  4) “후배에게 반드시 전해야 할 노하우 문화” 확립"}, {"no": 199, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-6", "cat": "A", "text": "- LOPE 자동화 설비 적용 (코일링, 포밍, 조립, 검사) \n   2026년 상반기 설비 세팅 완료 예정 \n  국내 포밍업체 방문 후 설비업체 최종 결정\n  세아제강 담당자 만나서 조관 설비 파악할 것"}, {"no": 200, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-6", "cat": "A", "text": "류이사가 혼자 따라 들어가고 부품 소싱, 품질 지키고, 조립라인 다 책임져야 하는 상황\n대성 단독으로 이끌어가기 힘든 상황이기 때문에 앞으로 협력기차와 같이 갈 것 \n미국은 발멕스, 한국은 현재 기계에서 합격한 제품을 골라서 시장에 판매하면서\n향후 협력기차와 기계 공동투자를 통해 생산되는 제품을 갖고 오는 방안 검토할 것"}, {"no": 201, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-6", "cat": "A", "text": "국내 판매용 원통형은 음성이 아닌 천진공장에서 열교환기를 제조할 것\n향후 보일러 조립까지 천진공장에서 할 경우 노조문제에서 벗어날 수 있다. \n음성 공장은 최종 제품 조립만 하며, 향후 보일러 시장이 줄면 음성공장의 라인을 줄여간다."}, {"no": 202, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-5", "cat": "A", "text": "미국은 가스 온수기와 히트펌프 두 개의 결합형이 향후 대세가 될 것\n히트펌프는 전기회사 보조금, 원통형온수기는 가스회사로부터 보조금을 받아 가정에서\n거의 공짜로 설치할 수 있는 정책을 감안하여 많이 보급할 수 있다.\n미국 시장은 2~3만대 판매에서 히트펌프와 같이 갈 경우 50만대까지 갈 수 있음 \n국내 또한 히트펌프 콤비가 대세가 될 수 있음 \n우리도 팀을 보강하여 R&D 인력, 대성물류건설, 보일러팀과 협력하여 \n회사 차원의 가장 중요한 프로젝트로 따라 들어가야 함\n결국 모든 부품은 중국에서 가져와야 하므로 지금부터 소싱업체 조사할 것"}, {"no": 203, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-6", "cat": "A", "text": "천진 공장은 포밍, 코일링 기계만 더 준비하고, 본격 증산을 위한 추가로 1개 라인 설비\n구축은 협력기차와 협의하고, 더 라인을 키울 지는 한국, 미국 시장 움직임과 미중 관세 \n관계를 보고 결정을 한다."}, {"no": 204, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-1", "cat": "A", "text": "5. 모니터링 제품 품질 문제점 개선 \n 1) 오링 씹힘으로 인한 누수 개선\n나중에 금형개발까지 갈 수 있도록 조치할 것"}, {"no": 205, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "A-1", "cat": "A", "text": "1.5, 1.6세대 쉽백 제품 모두 잠열 연결 부분 가스켓 개선된 열교환기 3세대로 교체할 것"}, {"no": 206, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "C-4", "cat": "C", "text": "미국 나비엔이 점유하는 온수기 시장과 신규 원통형 온수기 시장 둘다 점유율을 높인다. \n단순 잔고장을 빨리 손봐서 좋은 Reputation 받을 수 있으면 시장에서 붙어 볼만 하다.\n협력기차에 본격적으로 라인 깔아보고, 해당 라인을 사서 한국으로 갖고 오는 것은 \n미국과 중국과의 관세 관계를 보고 결정한다. \n영업에서 생각을 정리해서 R&D와 미국 시장 전체에 대한 생각을 공유할 것 \n미국 경쟁자들이 어떤 정책에 따라 어떤 가격을 쓰는 지 파악할 것"}, {"no": 207, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "C-2", "cat": "C", "text": "온라인 비즈니스 모델 만들 것 \nR&D는 온라인 모델에 사용할 마케팅 문구와 조성태 이사 어플리케이션 개발 도와줄 것"}, {"no": 208, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "C-3", "cat": "C", "text": "나중에 미∙중이 가까워 지면, 한국에 파는 중국 상품들을 미국에서도 팔아야 한다. \n1차는 원통형, 2차는 히트펌프이며 향후 판매망을 어떻게 만들어 갈 것인가에 대해 \n고 사장, 이해수 이사, 정부장과 같이 협력해 나갈 것"}, {"no": 209, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "C-5", "cat": "C", "text": "미국 판매시장에 대한 경험을 히트펌프 판매사원들에게도 공유해 줄 것 \n현장에서 시험한 결과를 갖고 어플리케이션을 개발하여 실제 시장이 어떻게 움직이는 지 \n이호준 법인장과 계속 체크"}, {"no": 210, "title": "대성쎌틱 회의 주요 지시사항 (원통형 생산∙R&D, 영업∙마케팅", "date": "2025.10.31(금)", "month": "2025.10", "code": "E-1", "cat": "E", "text": "향후 영업사원 4명의 경우 at": "D", "text": "< 판매조건 : Pro 육성 정책 >\n • 우리 Pro 서비스맨 (VTP : VESTA Pro Technician), Pro AS맨을 키우지 않으면 거래하지 않는다.\n   우리 교육을 적극적으로 받아야 하며 Pro 기사를 만들지 않는 Distributor와는 거래하지 않는다.\n • RING 제품의 경우 처음부터 Pro가 없을 경우 팔지 않는다.\n   콤비까지 들어갈 경우, H/P 보조로 들어가더라도 Pro가 붙지 않을 경우 H/P 업체에도 팔지 않는다. \n • 우리에게 6개월에 한번씩 교육을 받아서 자격을 유지한다. 바뀌면 새로 교육받는다. \n   그렇지 않을 경우 공급하지 않는다. \n • 리스트를 관리하며 실질적으로 평가하고 움직이는 조직이 갖춰질 때까지 팔지 않는다. \n • 보일러의 경우는 24시간 AS가 되어야 하기 때문에 좀 다르며 그래서 20곳 모두 조사해야 하며  \n   콤비가 팔린 곳도 똑같이 조사해야 한다. \n • 우리 서비스, 우리 제품을 적극적인 파트너가 되어서 우리가 정한 Pro 기사가 있는 곳만 거래한다. \n   이런 조건도 받아들여가면서 협력할 수 있는 회사를 찾아볼 것"}, {"no": 287, "title": "대성쎌틱 VESTA 회의 주요 지시사항 < LAS VEGAS 전시회 >", "date": "2026.02.09(월)", "month": "2026.02", "code": "E-1", "cat": "E", "text": "< 영업사원 채용전략 >  \n • Distributor 신규 개척 및 판매 목표를 달성할 때마다 기본금+인센티브 상향, 달성 못하면 퇴출 \n • 세일즈맨을 고를 때부터 우리가 목적으로 하는 시장에 맞는 사람을 채용할 것 \n • 새로운 급여체계도 본사와 LA 사무실과 협의해서 만들어 나갈 것 \n • 얼마만큼의 세일즈맨을 키울지는 60% Distributor 관계회복 상황을 보고 결정하자."}, {"no": 288, "title": "대성쎌틱 VESTA 회의 주요 지시사항 < LAS VEGAS 전시회 >", "date": "2026.02.09(월)", "month": "2026.02", "code": "E-1", "cat": "E", "text": "< 교육 준비 > \n • Pro 교육 준비 빨리 진행할 것 \n • 조이사와 류이사 R&D에서 준비하고 기술 Tech 팀과 영업팀에서도 어떻게 진행할지 검토할 것 \n • 교육 매뉴얼을 준비하고 교육프로그램은 시행해보면서 계속 고쳐 나갈 것 \n • Tech 교육을 우리 현재 팀이 3개월 동안 몇 군데 할 수 있는 지 파악해 볼 것"}, {"no": 289, "title": "대성쎌틱 VESTA 회의 주요 지시사항 < LAS VEGAS 전시회 >", "date": "2026.02.09(월)", "month": "2026.02", "code": "D-2", "cat": "D", "text": "• 온라인 교육을 시행하면 업무량이 많아 지면서 적정 테크 기술 인력 정원이 나오게 된다. \n   Tech 교육 시켜서 Pro가 몇 명 만들어지냐가 우리 판매의 한계다. \n   교육 시키고, Pro 만들어진 것 확인하고 그 다음 세일즈맨이 이번 달에 몇 개 팔겠다. \n   그 사람들이 제시하는 숫자를 모으는 것이 우리 판매계획이다. \n   Richard 책상 위에서 작성한 판매계획을 앞으로 본사에 보고하지 말 것"}, {"no": 290, "title": "대성쎌틱 VESTA 회의 주요 지시사항 < LAS VEGAS 전시회 >", "date": "2026.02.09(월)", "month": "2026.02", "code": "D-1", "cat": "D", "text": "• 먼저 Distributor와의 관계를 살려서 Distributor가 요구하는 수량을 받아라. \n   Distirbutor들에게 연락해서 3개를 무료로 받겠다. 10개를 받겠다. 반품으로 받겠다. \n   그런 정보들을 모아서 다시 활성화된 Distributor가 요구한 판매계획만 보고할 것 \  "cat": "C", "text": "소비자에게 온수를 빨리 받을 수 있고 편리한 캐스케이드 리서큘레이션에 대한 제안을 해보고\n  도면을 받아 배관업체에 맡겨 리서큘레이션을 만들고 그대로 가동이 되는지 안 되는지 확인하며\n  사후 관리하는 서비스가 정착되면 캐스케이드가 더 많이 팔리면서 대성의 평판도 같이 좋아질 것\n  리서큘레이션이 필요한 곳은 도입할 수 있도록 준비하고 모니터링 하면서 개선해 나가도록 영업.\n• 현장 설치부터 개발부와 같이 협의해 나가고, 개발부의 의견이 효과가 있는 지 없는 지, 다른 문제가 \n  있으면 또 바로 개발부가 가서 일하면서 같이 R&D를 계속 개선시켜 나간다. \n• 요즘 같은 겨울에는 소비자가 빠른 온수를 원할 수 \n  있으므로 영업 쪽에서 어플리케이션을 계속 발전시킬 수 있도록 소비자에 노크할 것"}, {"no": 333, "title": "대성쎌틱 회의 주요 지시사항  < 1월 에너지기기회의 보고 >", "date": "2026.01.15(목)", "month": "2026.01", "code": "C-6", "cat": "C", "text": "• 전기온수기 판매루트를 더 개발할 것 (화장실•주방시설 전문 공사업자, 미용실, 병원, 프랜차이즈 식당)\n  판매 대리점만 해서는 안 되며 전국적으로 지역별로 본격적으로 영업할 것 \n• 전기온수기는 적은 이익으로 많이 팔아야 하는 제품으로 우리 또한 가스보일러의 부수적인 제품으로만 \n  생각하고 있지만 가스보일러와 똑같은 방법으로 깊게 들어가 영업체계가 갖춰지도록 해야 함.\n• 전기온수기 영업 시스템을 가스보일러 시스템에 그대로 적용한다. 전국적으로 지역별로 네트워크 영업\n  하면서 아파트, 연립주택 판매망에도 본격적으로 만들어 갈 것. 온수기 AS는 훨씬 쉬울 것."}, {"no": 334, "title": "대성쎌틱 회의 주요 지시사항  < 1월 에너지기기회의 보고 >", "date": "2026.01.15(목)", "month": "2026.01", "code": "C-6", "cat": "C", "text": "• 프랜차이즈 영업 : 미용실, 중화음식업협회\n• 프랜차이즈의 경우 서비스로봇 뿐만 아니라 온수기,   환기, 리필캔, C&S세제도 같이 판매가 가능하다.\n  각 사업장 영업할 때 타사업장 제품도 같이 들고 갈 것\n  각 사업장에서 회사별로 디테일 포함해서 관리하며 통합관리는 본사 혹은 책임 사업부가 맡는 시스템을\n  검토해 볼 것 _ 재개발 사업장 포함"}, {"no": 335, "title": "대성쎌틱 회의 주요 지시사항  < 1월 에너지기기회의 보고 >", "date": "2026.01.15(목)", "month": "2026.01", "code": "C-6", "cat": "C", "text": "• 상품판매점 개설 : 누계 32개소 \n• 지역별로 자세히 쪼개주고 어느 상품을 어느 시장에 주로 파는 지 추가로 표시해 줄 것"}, {"no": 336, "title": "대성쎌틱 회의 주요 지시사항  < 1월 에너지기기회의 보고 >", "date": "2026.01.15(목)", "month": "2026.01", "code": "C-6", "cat": "C", "text": "공장의 난방 체계 공사할 일 있으면 연락 주세요. 광고를 보고 주문이 들어오면  \n  우리 쪽에서 기본 엔지니어링을 한 후 지역 내 잘 아는 설비업체와 연결시켜 주면 된다.\n  엔지니어링 결과는 자료를 받아 데이터베이스에 축적해 나가는 플랫폼을 구축한다 _ 엔지니어링 서비스"}, {"no": 337, "title": "대성쎌틱 회의 주요 지시사항  < 1월 에너지기기회의 보고 >", "date": "2026.01.15(목)", "month": "2026.01", "code": "C-2", "cat": "C", "text": "< 온라인 판매 > : 네이버 78%, 기타 22% \n• Shopify에서 대성쎌틱 쇼핑몰 빨리 만들 것. \n  히트펌프도 간단하게 쓰고 대성계전도 쓰면서 본사에서도 이것들을 합쳐     validSubs.forEach(function(sub,si){
      var moCnts=MONTHS.map(function(mo){return RAW.filter(function(r){return r.code===sub.code&&r.month===mo;}).length;});
      var tot=moCnts.reduce(function(a,b){return a+b;},0);
      var isLast=si===validSubs.length-1;
      var bb=isLast?"border-bottom:2px solid var(--border);":"border-bottom:1px solid #252b35;";
      var subShort=sub.label.replace(/^\d+\.\s*/,"");
      var moCells=moCnts.map(function(cnt,i){
        if(cnt>0)return "<td class=\"nc\" style=\""+bb+"\"><span class=\"fn\" style=\"background:"+c.bg+";color:"+c.color+"\" onclick=\"drillDown('"+MONTHS[i]+"','"+grp.code+"','"+sub.code+"',this)\">"+cnt+"</span></td>";
        return "<td class=\"nc\" style=\""+bb+"\"><span class=\"fn zero\">—</span></td>";
      }).join("");
      rows+="<tr class=\"rsub\">"
           +"<td class=\"sub-name\" style=\""+bb+"\">"+subShort+"</td>"
           +moCells
           +"<td class=\"nc\" style=\""+bb+"\"><span class=\"fn\" style=\"background:"+c.bg+";color:"+c.color+";font-weight:800\" onclick=\"drillDown(null,'"+grp.code+"','"+sub.code+"',this)\">"+tot+"</span></td>"
           +"</tr>";
    });
  });
  // 합계 행
  var gCells=MONTHS.map(function(mo,i){
    var cnt=RAW.filter(function(r){return r.month===mo;}).length;
    return "<td class=\"nc\"><span class=\"fn\" style=\"background:rgba(255,255,255,0.07);color:var(--text)\" onclick=\"drillDown('"+MONTHS[i]+"',null,null,this)\">"+cnt+"</span></td>";
  }).join("");
  rows+="<tr class=\"rtot\"><td colspan=\"2\" style=\"color:var(--text)\">합 계</td>"
       +gCells
       +"<td class=\"nc\"><span class=\"fn\" style=\"background:rgba(255,255,255,0.1);color:var(--text)\" onclick=\"drillDown(null,null,null,this)\">363</span></td></tr>";
  document.getElementById("freqBody").innerHTML=rows;
}

var drillKey=null;
function drillDown(mo,cat,code,el){
  var key=(mo||"")+(cat||"")+(code||"");
  document.querySelectorAll(".fn.active-cell").forEach(function(e){e.classList.remove("active-cell");});
  if(drillKey===key){closeDrill();return;}
  drillKey=key;
  if(el)el.classList.add("active-cell");
  var items=RAW.filter(function(r){
    if(mo&&r.month!==mo)return false;
    if(cat&&r.cat!==cat)return false;
    if(code&&r.code!==code)return false;
    return true;
  });
  var parts=[];
  if(mo)parts.push(mo);
  if(cat)parts.push(CAT_LABEL[cat]||cat);
  if(code)parts.push(code+" "+((SUB_LABEL[code]||"").replace(/^\d+\.\s*/,"")));
  if(!parts.length)parts.push("전체");
  document.getElementById("drillTitle").textContent=parts.join(" \u203a ");
  document.getElementById("drillMeta").textContent="\ucd1d "+items.length+"\uac74";
  document.getElementById("drillList").innerHTML=items.map(function(r){
    var c=getC(r.cat);
    var subShort=(SUB_LABEL[r.code]||"").replace(/^\d+\.\s*/,"");
    return "<li class=\"ditem\" onclick=\"openModal("+r.no+")\">"
          +"<div class=\"dino\">#"+r.no+" \u00b7 "+r.date+"</div>"
          +"<div class=\"ditext\">"+r.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</div>"
          +"<div class=\"dimeta\">"
          +"<span class=\"ctag\" style=\"background:"+c.bg+";color:"+c.color+"\">"+r.code+"</span>"
          +"<span style=\"color:var(--text2)\">"+subShort+"</span>"
          +"</div></li>";
  }).join("");
  document.getElementById("drillEmpty").style.display="none";
  document.getElementById("drillPanel").style.display="block";
}
function closeDrill(){
  document.getElementById("drillPanel").style.display="none";
  document.getElementById("drillEmpty").style.display="flex";
  document.querySelectorAll(".fn.active-cell").forEach(function(e){e.classList.remove("active-cell");});
  drillKey=null;
}

var filtered=RAW.slice(),curCat="",curPage=1,PER=20;
function setCat(cat,btn){
  curCat=cat;
  document.querySelectorAll(".cbt").forEach(function(b){b.classList.remove("active");b.style.background="";});
  btn.classList.add("active");
  if(cat)btn.style.background=getC(cat).bg;
  curPage=1;applyFilter();
}
function applyFilter(){
  var q=document.getElementById("searchInput").value.toLowerCase();
  var mo=document.getElementById("monthSel").value;
  filtered=RAW.filter(function(r){
    if(curCat&&r.cat!==curCat)return false;
    if(mo&&r.month!==mo)return false;
    if(q&&r.text.toLowerCase().indexOf(q)<0&&r.title.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  curPage=1;renderTable();
}
function renderTable(){
  var pd=filtered.slice((curPage-1)*PER,curPage*PER);
  document.getElementById("tableBody").innerHTML=pd.map(function(r){
    var c=getC(r.cat);
    var catShort=(CAT_LABEL[r.cat]||"").replace(/^[A-F]\.\s*/,"");
    var subShort=(SUB_LABEL[r.code]||"").replace(/^\d+\.\s*/,"");
    var safeText=r.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return "<tr>"
          +"<td style=\"font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);width:38px\">"+r.no+"</td>"
          +"<td style=\"font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);width:110px;white-space:nowrap\">"+r.date+"</td>"
          +"<td style=\"width:50px\"><span class=\"ctag\" style=\"background:"+c.bg+";color:"+c.color+"\">"+r.code+"</span></td>"
          +"<td style=\"font-size:12px;color:var(--text2);width:120px\">"+catShort+"</td>"
          +"<td style=\"font-size:12px;color:var(--text2);width:135px\">"+subShort+"</td>"
          +"<td class=\"td-text\">"+safeText+"</td>"
          +"</tr>";
  }).join("");
  document.getElementById("resultCount").textContent=filtered.length+"\uac74";
  renderPgn();
}
function renderPgn(){
  var tot=Math.ceil(filtered.length/PER);
  var pg=document.getElementById("pagination");
  if(tot<=1){pg.innerHTML="";return;}
  var h="<button class=\"pgb\" onclick=\"goPage("+(curPage-1)+")\" "+(curPage===1?"disabled":"")+">&#8249;</button>";
  var s=Math.max(1,curPage-3),e=Math.min(tot,curPage+3);
  if(s>1)h+="<button class=\"pgb\" onclick=\"goPage(1)\">1</button>"+(s>2?"<span style=\"padding:0 4px;color:var(--text2)\">&#8230;</span>":"");
  for(var i=s;i<=e;i++)h+="<button class=\"pgb "+(i===curPage?"active":"")+"\" onclick=\"goPage("+i+")\">"+i+"</button>";
  if(e<tot)h+=(e<tot-1?"<span style=\"padding:0 4px;color:var(--text2)\">&#8230;</span>":"")+"<button class=\"pgb\" onclick=\"goPage("+tot+")\">"+tot+"</button>";
  h+="<button class=\"pgb\" onclick=\"goPage("+(curPage+1)+")\" "+(curPage===tot?"disabled":"")+">&#8250;</button>";
  pg.innerHTML=h;
}
function goPage(p){curPage=p;renderTable();document.querySelector(".tbl-wrap").scrollIntoView({behavior:"smooth",block:"start"});}

function openModal(no){
  var r=RAW.find(function(x){return x.no===no;});if(!r)return;
  var c=getC(r.cat);
  var subShort=(SUB_LABEL[r.code]||"").replace(/^\d+\.\s*/,"");
  document.getElementById("modalMeta").innerHTML=
    "<span>"+r.date+"</span>"
    +"<span class=\"ctag\" style=\"background:"+c.bg+";color:"+c.color+"\">"+r.code+"</span>"
    +"<span class=\"ctag\" style=\"background:rgba(255,255,255,0.06);color:var(--text2)\">"+subShort+"</span>";
  document.getElementById("modalTitle").textContent=r.title;
  document.getElementById("modalBody").textContent=r.text;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}

  renderTable();
  var MTG={"2025.10":7,"2025.11":3,"2025.12":3,"2026.01":4,"2026.02":2};

          title:{display:true,text:"지시사항",color:"#8b949e",font:{size:11}}},
        yR:{position:"right",grid:{drawOnChartArea:false},
          ticks:{color:"#8b949e",font:{size:12},stepSize:1,callback:function(v){return Number.isInteger(v)?v:null;}},
          beginAtZero:true,max:8,
          title:{display:true,text:"회의 횟수",color:"#8b949e",font:{size:11}}}
      }}
  });
  new Chart(document.getElementById("catChart"),{type:"doughnut",
    data:{labels:STRUCTURE.map(function(g){return g.code+". "+g.label.replace(/^[A-F]\. /,"");}),
      datasets:[{data:STRUCTURE.map(function(g){return RAW.filter(function(r){return r.cat===g.code;}).length;}),

    options:{responsive:true,maintainAspectRatio:false,cutout:"65%",
      plugins:{legend:{position:"right",labels:{color:"#8b949e",font:{size:12},padding:10}}}}
  });
  new Chart(document.getElementById("stackChart"),{type:"bar",
    data:{labels:MONTHS,
      datasets:STRUCTURE.map(function(g){return{label:g.label,
        data:MONTHS.map(function(mo){return RAW.filter(function(r){return r.cat===g.code&&r.month===mo;}).length;}),
        backgroundColor:COLORS[g.code].color,borderRadius:3,borderSkipped:false};})},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{color:"#8b949e",font:{size:12},padding:10}}},
      scales:{x:{stacked:true,grid:{color:"#30363d"},ticks:{color:"#8b949e",font:{size:12}}},
              y:{stacked:true,grid:{color:"#30363d"},ticks:{color:"#8b949e",font:{size:12}},beginAtZero:true}}}
  });
});
</script>

<script>
(function(){
  const hdr = document.querySelector('.header');
  if(!hdr) return;

  // 버튼 생성
  const btn = document.createElement('button');
  btn.className = 'senior-toggle';
  btn.type = 'button';
  btn.textContent = '큰글씨·밝은화면';
  btn.onclick = function(){
    const root = document.documentElement;
    const on = !root.classList.contains('senior');
    root.classList.toggle('senior', on);
    localStorage.setItem('vesta_senior_mode', on ? '1' : '0');
  };

  // 제목(통합표) 바로 옆에 배치
  const h1 = hdr.querySelector('h1');
  if(h1){
    // h1을 inline-flex 컨테이너로 만들어 버튼이 옆에 붙도록 함
    h1.style.display = 'inline-flex';
    h1.style.alignItems = 'center';
    h1.style.gap = '12px';
    h1.appendChild(btn);
  }else{
    hdr.insertBefore(btn, hdr.firstChild);
  }

  // 모드 복원
  const saved = localStorage.getItem('vesta_senior_mode');
  if(saved === '1'){
    document.documentElement.classList.add('senior');
  }
})();
</script>

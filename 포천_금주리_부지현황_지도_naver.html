  .cat-label {

  .parcel-item {

  .naver-popup {

  naver.maps.Service.geocode({ query: addr }, function(status, res) {
    if (status === naver.maps.Service.Status.OK && res.v2.addresses.length > 0) {
      const r = res.v2.addresses[0];
      createMarker(idx, parseFloat(r.y), parseFloat(r.x), p);
    }
    setTimeout(() => geocodeAll(idx+1), 100);
  });
}

function createMarker(idx, lat, lng, p) {
  const color = CAT_COLORS[p.cat];
  const pos = new naver.maps.LatLng(lat, lng);
  const marker = new naver.maps.Marker({
    position: pos, map: map,
    icon: {
      content: `<div style="width:28px;height:36px;cursor:pointer">
        <svg xmlns='http://www.w3.org/2000/svg' width='28' height='36'>
          <path d='M14 0C6.3 0 0 6.3 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.3 21.7 0 14 0z' fill='${color}' opacity='0.9'/>
          <circle cx='14' cy='14' r='6' fill='white' opacity='0.9'/>
        </svg></div>`,
      anchor: new naver.maps.Point(14, 36)
    }
  });
  markers[idx] = marker;

  const iw = new naver.maps.InfoWindow({
    content: `<div class="naver-popup">
      <div class="popup-cat" style="color:${color}">${p.cat}</div>
      <div class="popup-jibun">금주리 ${p.jibun}</div>
      <div class="popup-row"><span class="k">지목</span><span class="v">${p.jimok}</span></div>
      ${p.user?`<div class="popup-row"><span class="k">사용자</span><span class="v">${p.user}</span></div>`:''}
      ${p.owner?`<div class="popup-row"><span class="k">소유자</span><span class="v">${p.owner}</span></div>`:''}
      ${p.note?`<div class="popup-row"><span class="k">비고</span><span class="v">${p.note}</span></div>`:''}
      <div class="popup-divider"></div>
      <div class="popup-area-big">${p.area_m2.toLocaleString()}<span> ㎡</span></div>
      <div style="font-size:11px;color:#8b949e;margin-top:2px">${p.area_py.toLocaleString()} 평</div>
    </div>`,
    backgroundColor: 'transparent',
    borderWidth: 0,
    anchorSize: new naver.maps.Size(0,0),
    pixelOffset: new naver.maps.Point(0, -40)
  });
  infoWindows[idx] = iw;

  naver.maps.Event.addListener(marker, 'click', () => {
    const listEl = document.querySelector(`.parcel-item[data-idx="${idx}"]`);
    selectParcel(idx, listEl);
    if (listEl) listEl.scrollIntoView({behavior:'smooth', block:'nearest'});
  });
}

function selectParcel(idx, listEl) {
  infoWindows.forEach(iw => { if(iw) iw.close(); });
  if (activeListItem) activeListItem.classList.remove('active');
  activeIdx = idx;
  if (listEl) { listEl.classList.add('active'); activeListItem = listEl; }
  if (markers[idx]) {
    map.setCenter(markers[idx].getPosition());
    map.setZoom(17);
    if (infoWindows[idx]) infoWindows[idx].open(map, markers[idx]);
  }
}

function toggleCat(badge) {
  const cat = badge.dataset.cat;
  if (visibleCats.has(cat)) { visibleCats.delete(cat); badge.classList.add('inactive'); }
  else { visibleCats.add(cat); badge.classList.remove('inactive'); }
  PARCELS.forEach((p,i) => { if(markers[i]) markers[i].setVisible(visibleCats.has(p.cat)); });
  buildList();
}

function filterList() {
  filterText = document.getElementById('search-input').value.toLowerCase();
  buildList();
}

function buildList() {
  const container = document.getElementById('parcel-list');
  container.innerHTML = '';
  const groups = {};
  let shown = 0;

  PARCELS.forEach((p,idx) => {
    if (!visibleCats.has(p.cat)) return;
    if (filterText && !p.jibun.includes(filterText) && !(p.user||'').includes(filterText) && !(p.jimok||'').includes(filterText)) return;
    if (!groups[p.cat]) groups[p.cat] = [];
    groups[p.cat].push({p,idx});
    shown++;
  });

  cats.forEach(cat => {
    if (!groups[cat]) return;
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.innerHTML = `<div class="dot" style="background:${CAT_COLORS[cat]}"></div>${cat} (${groups[cat].length})`;
    container.appendChild(lbl);
    groups[cat].forEach(({p,idx}) => {
      const item = document.createElement('div');
      item.className = 'parcel-item' + (idx===activeIdx?' active':'');
      item.dataset.idx = idx;
      item.innerHTML = `
        <div class="parcel-num">${p.no}</div>
        <div class="parcel-info">
          <div class="parcel-jibun" style="color:${CAT_COLORS[p.cat]}">금주리 ${p.jibun}</div>
          <div class="parcel-sub">${p.jimok}${p.user?' · '+p.user:''}${p.note?' · '+p.note:''}</div>
        </div>
        <div class="parcel-area">${p.area_m2.toLocaleString()}<span>㎡</span></div>`;
      item.onclick = () => selectParcel(idx, item);
      container.appendChild(item);
    });
  });
  document.getElementById('list-count').textContent = shown+'개';
}
</script>
</body>
</html>
